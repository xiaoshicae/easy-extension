<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="system-ui,-apple-system,sans-serif">
  <defs>
    <filter id="s" x="-2%" y="-3%" width="104%" height="110%">
      <feDropShadow dx="0" dy="1" stdDeviation="2.5" flood-opacity="0.07"/>
    </filter>
    <marker id="a" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect width="800" height="520" fill="#fff" rx="10"/>

  <!-- ============ Row 1: Extension Point ============ -->
  <text x="400" y="30" text-anchor="middle" font-size="15" font-weight="700" fill="#1e293b">核心概念与关系</text>

  <!-- Extension Point box: blue -->
  <rect x="200" y="52" width="400" height="70" rx="12" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5" filter="url(#s)"/>
  <rect x="216" y="64" width="56" height="22" rx="11" fill="#3b82f6"/>
  <text x="244" y="79" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">扩展点</text>
  <text x="400" y="82" text-anchor="middle" font-size="14" font-weight="600" fill="#1e40af">系统定义的接口</text>
  <text x="400" y="104" text-anchor="middle" font-size="11" fill="#64748b">例如: 运费计算、订单校验、促销计算、支付方式 ...</text>

  <!-- Arrow down -->
  <text x="400" y="146" text-anchor="middle" font-size="12" fill="#94a3b8">谁来实现这些接口？</text>
  <line x1="200" y1="155" x2="200" y2="178" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#a)"/>
  <line x1="400" y1="155" x2="400" y2="178" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#a)"/>
  <line x1="600" y1="155" x2="600" y2="178" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#a)"/>

  <!-- ============ Row 2: Three sources (unified colors) ============ -->
  <!-- Ability: green -->
  <rect x="70" y="182" width="260" height="108" rx="12" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1.5" filter="url(#s)"/>
  <rect x="86" y="194" width="46" height="20" rx="10" fill="#16a34a"/>
  <text x="109" y="208" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">能力</text>
  <text x="200" y="232" text-anchor="middle" font-size="13" font-weight="600" fill="#166534">通用产品能力</text>
  <text x="200" y="252" text-anchor="middle" font-size="11" fill="#16a34a">可被多个业务复用</text>
  <text x="200" y="276" text-anchor="middle" font-size="10" fill="#6b7280">如: 包邮、VIP优惠券、分期免息、急速达</text>

  <!-- Business: yellow -->
  <rect x="350" y="182" width="220" height="108" rx="12" fill="#fefce8" stroke="#fbbf24" stroke-width="1.5" filter="url(#s)"/>
  <rect x="366" y="194" width="46" height="20" rx="10" fill="#d97706"/>
  <text x="389" y="208" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">业务</text>
  <text x="460" y="232" text-anchor="middle" font-size="13" font-weight="600" fill="#92400e">业务方自定义</text>
  <text x="460" y="252" text-anchor="middle" font-size="11" fill="#a16207">只针对自己的业务场景</text>
  <text x="460" y="276" text-anchor="middle" font-size="10" fill="#6b7280">如: 生鲜的冷链运费、数码的序列号校验</text>

  <!-- Default: gray -->
  <rect x="590" y="182" width="150" height="108" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5" filter="url(#s)"/>
  <rect x="606" y="194" width="46" height="20" rx="10" fill="#94a3b8"/>
  <text x="629" y="208" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">默认</text>
  <text x="665" y="232" text-anchor="middle" font-size="13" font-weight="600" fill="#475569">默认实现</text>
  <text x="665" y="252" text-anchor="middle" font-size="11" fill="#64748b">系统提供</text>
  <text x="665" y="276" text-anchor="middle" font-size="10" fill="#6b7280">扩展点的默认行为</text>

  <!-- ============ Row 3: Business mount abilities ============ -->
  <line x1="40" y1="310" x2="760" y2="310" stroke="#f1f5f9" stroke-width="1.5"/>
  <text x="400" y="340" text-anchor="middle" font-size="14" font-weight="700" fill="#1e293b">业务如何挂载能力？</text>

  <!-- Business Retail: yellow -->
  <rect x="60" y="360" width="200" height="140" rx="12" fill="#fefce8" stroke="#fbbf24" stroke-width="1.5" filter="url(#s)"/>
  <rect x="76" y="372" width="46" height="20" rx="10" fill="#d97706"/>
  <text x="99" y="386" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">业务</text>
  <text x="160" y="387" font-size="13" font-weight="600" fill="#92400e">标准零售</text>

  <text x="160" y="420" text-anchor="middle" font-size="11" fill="#64748b">挂载的能力:</text>
  <rect x="80" y="430" width="72" height="24" rx="6" fill="#d1fae5" stroke="#6ee7b7"/>
  <text x="116" y="447" text-anchor="middle" font-size="10" fill="#166534">包邮</text>
  <rect x="160" y="430" width="82" height="24" rx="6" fill="#d1fae5" stroke="#6ee7b7"/>
  <text x="201" y="447" text-anchor="middle" font-size="10" fill="#166534">VIP优惠券</text>
  <text x="160" y="480" text-anchor="middle" font-size="10" fill="#94a3b8">+ 自己实现: 订单校验</text>

  <!-- Business Fresh: yellow (same as retail) -->
  <rect x="300" y="360" width="200" height="140" rx="12" fill="#fefce8" stroke="#fbbf24" stroke-width="1.5" filter="url(#s)"/>
  <rect x="316" y="372" width="46" height="20" rx="10" fill="#d97706"/>
  <text x="339" y="386" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">业务</text>
  <text x="400" y="387" font-size="13" font-weight="600" fill="#92400e">生鲜电商</text>

  <text x="400" y="420" text-anchor="middle" font-size="11" fill="#64748b">挂载的能力:</text>
  <rect x="320" y="430" width="72" height="24" rx="6" fill="#d1fae5" stroke="#6ee7b7"/>
  <text x="356" y="447" text-anchor="middle" font-size="10" fill="#166534">包邮</text>
  <rect x="400" y="430" width="82" height="24" rx="6" fill="#d1fae5" stroke="#6ee7b7"/>
  <text x="441" y="447" text-anchor="middle" font-size="10" fill="#166534">急速达</text>
  <text x="400" y="480" text-anchor="middle" font-size="10" fill="#94a3b8">+ 自己实现: 冷链运费、库存检查</text>

  <!-- Business Digital: yellow (same) -->
  <rect x="540" y="360" width="200" height="140" rx="12" fill="#fefce8" stroke="#fbbf24" stroke-width="1.5" filter="url(#s)"/>
  <rect x="556" y="372" width="46" height="20" rx="10" fill="#d97706"/>
  <text x="579" y="386" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">业务</text>
  <text x="640" y="387" font-size="13" font-weight="600" fill="#92400e">数码3C</text>

  <text x="640" y="420" text-anchor="middle" font-size="11" fill="#64748b">挂载的能力:</text>
  <rect x="556" y="430" width="82" height="24" rx="6" fill="#d1fae5" stroke="#6ee7b7"/>
  <text x="597" y="447" text-anchor="middle" font-size="10" fill="#166534">分期免息</text>
  <rect x="646" y="430" width="82" height="24" rx="6" fill="#d1fae5" stroke="#6ee7b7"/>
  <text x="687" y="447" text-anchor="middle" font-size="10" fill="#166534">VIP优惠券</text>
  <text x="640" y="480" text-anchor="middle" font-size="10" fill="#94a3b8">+ 自己实现: 风控、发票</text>
</svg>
