<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="system-ui,-apple-system,sans-serif">
  <defs>
    <filter id="s" x="-2%" y="-3%" width="104%" height="110%">
      <feDropShadow dx="0" dy="1" stdDeviation="2.5" flood-opacity="0.07"/>
    </filter>
    <marker id="a" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect width="800" height="600" fill="#fff" rx="10"/>

  <!-- ============ Title ============ -->
  <text x="400" y="26" text-anchor="middle" font-size="15" font-weight="700" fill="#1e293b">核心概念分层</text>
  <text x="400" y="46" text-anchor="middle" font-size="11" fill="#94a3b8">扩展点作为底层契约   ·   能力 / 业务 / 默认实现 都可填充   ·   业务可挂载能力组合行为</text>

  <!-- ============ Layer 3: Business (top) ============ -->
  <rect x="50" y="62" width="700" height="124" rx="12" fill="#fefce8" stroke="#fbbf24" stroke-width="1.5" filter="url(#s)"/>
  <rect x="66" y="74" width="56" height="22" rx="11" fill="#d97706"/>
  <text x="94" y="89" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">业务</text>
  <text x="138" y="89" font-size="13" font-weight="600" fill="#92400e">BUSINESS</text>
  <text x="138" y="107" font-size="11" fill="#a16207">业务方接入  ·  挂载能力  ·  必要时自己实现扩展点</text>

  <rect x="80" y="123" width="200" height="54" rx="8" fill="#fff" stroke="#fbbf24"/>
  <text x="180" y="146" text-anchor="middle" font-size="12" font-weight="600" fill="#92400e">标准零售</text>
  <text x="180" y="164" text-anchor="middle" font-size="10" fill="#a16207">RetailBusiness</text>

  <rect x="300" y="123" width="200" height="54" rx="8" fill="#fff" stroke="#fbbf24"/>
  <text x="400" y="146" text-anchor="middle" font-size="12" font-weight="600" fill="#92400e">生鲜电商</text>
  <text x="400" y="164" text-anchor="middle" font-size="10" fill="#a16207">FreshBusiness</text>

  <rect x="520" y="123" width="200" height="54" rx="8" fill="#fff" stroke="#fbbf24"/>
  <text x="620" y="146" text-anchor="middle" font-size="12" font-weight="600" fill="#92400e">数码 3C</text>
  <text x="620" y="164" text-anchor="middle" font-size="10" fill="#a16207">DigitalBusiness</text>

  <!-- ============ Arrows: Business → Ability (solid, "挂载") ============ -->
  <line x1="190" y1="192" x2="190" y2="234" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="208" y="218" font-size="11" font-weight="600" fill="#64748b">挂载</text>

  <!-- ============ Arrows: Business → Extension Point (dashed bypass) ============ -->
  <line x1="400" y1="192" x2="400" y2="432" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#a)"/>
  <!-- Pill-shaped label box breaking the dashed line for the bypass relation -->
  <rect x="346" y="296" width="108" height="26" rx="13" fill="#fff" stroke="#cbd5e1" stroke-width="1"/>
  <text x="400" y="313" text-anchor="middle" font-size="11" font-weight="600" fill="#475569">业务直接实现 EP</text>

  <!-- ============ Layer 2L: Ability (middle-left) ============ -->
  <rect x="50" y="240" width="290" height="150" rx="12" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1.5" filter="url(#s)"/>
  <rect x="66" y="252" width="56" height="22" rx="11" fill="#16a34a"/>
  <text x="94" y="267" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">能力</text>
  <text x="138" y="267" font-size="13" font-weight="600" fill="#166534">ABILITY</text>
  <text x="138" y="285" font-size="11" fill="#16a34a">跨业务复用的产品能力</text>

  <rect x="70" y="306" width="78" height="52" rx="7" fill="#fff" stroke="#6ee7b7"/>
  <text x="109" y="325" text-anchor="middle" font-size="11" font-weight="600" fill="#166534">包邮</text>
  <text x="109" y="345" text-anchor="middle" font-size="9" fill="#16a34a">FreeShipping</text>

  <rect x="161" y="306" width="78" height="52" rx="7" fill="#fff" stroke="#6ee7b7"/>
  <text x="200" y="325" text-anchor="middle" font-size="11" font-weight="600" fill="#166534">VIP 券</text>
  <text x="200" y="345" text-anchor="middle" font-size="9" fill="#16a34a">VipCoupon</text>

  <rect x="252" y="306" width="78" height="52" rx="7" fill="#fff" stroke="#6ee7b7"/>
  <text x="291" y="325" text-anchor="middle" font-size="11" font-weight="600" fill="#166534">急速达</text>
  <text x="291" y="345" text-anchor="middle" font-size="9" fill="#16a34a">Express</text>

  <text x="200" y="378" text-anchor="middle" font-size="10" font-style="italic" fill="#16a34a">同一能力可被多个业务挂载</text>

  <!-- ============ Layer 2R: Default Impl (middle-right) ============ -->
  <rect x="460" y="240" width="290" height="150" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5" filter="url(#s)"/>
  <rect x="476" y="252" width="56" height="22" rx="11" fill="#94a3b8"/>
  <text x="504" y="267" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">默认</text>
  <text x="548" y="267" font-size="13" font-weight="600" fill="#475569">DEFAULT</text>
  <text x="548" y="285" font-size="11" fill="#64748b">系统提供的兜底实现</text>

  <rect x="480" y="306" width="250" height="64" rx="8" fill="#fff" stroke="#cbd5e1"/>
  <text x="605" y="328" text-anchor="middle" font-size="12" font-weight="600" fill="#475569">DefaultImpl</text>
  <text x="605" y="348" text-anchor="middle" font-size="10" fill="#64748b">当业务/能力均未实现时调用</text>
  <text x="605" y="363" text-anchor="middle" font-size="10" fill="#64748b">保证扩展点永远可用</text>

  <!-- ============ Arrows: Ability/Default → Extension Point ============ -->
  <line x1="190" y1="398" x2="190" y2="432" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="208" y="418" font-size="11" font-weight="600" fill="#64748b">实现</text>

  <line x1="605" y1="398" x2="605" y2="432" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="623" y="418" font-size="11" font-weight="600" fill="#64748b">兜底</text>

  <!-- ============ Layer 1: Extension Point (bottom — foundation) ============ -->
  <rect x="50" y="438" width="700" height="138" rx="12" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5" filter="url(#s)"/>
  <rect x="66" y="450" width="56" height="22" rx="11" fill="#3b82f6"/>
  <text x="94" y="465" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">扩展点</text>
  <text x="138" y="465" font-size="13" font-weight="600" fill="#1e40af">EXTENSION POINT</text>
  <text x="138" y="483" font-size="11" fill="#3b82f6">系统定义的接口契约 · 规定"做什么" · 由上层填充"怎么做"</text>

  <rect x="80" y="500" width="150" height="60" rx="8" fill="#fff" stroke="#93c5fd"/>
  <text x="155" y="523" text-anchor="middle" font-size="12" font-weight="600" fill="#1e40af">运费计算</text>
  <text x="155" y="541" text-anchor="middle" font-size="10" fill="#3b82f6">IFreightCalc</text>

  <rect x="250" y="500" width="150" height="60" rx="8" fill="#fff" stroke="#93c5fd"/>
  <text x="325" y="523" text-anchor="middle" font-size="12" font-weight="600" fill="#1e40af">订单校验</text>
  <text x="325" y="541" text-anchor="middle" font-size="10" fill="#3b82f6">IOrderValidate</text>

  <rect x="420" y="500" width="150" height="60" rx="8" fill="#fff" stroke="#93c5fd"/>
  <text x="495" y="523" text-anchor="middle" font-size="12" font-weight="600" fill="#1e40af">促销计算</text>
  <text x="495" y="541" text-anchor="middle" font-size="10" fill="#3b82f6">IPromotionCalc</text>

  <rect x="590" y="500" width="140" height="60" rx="8" fill="#fff" stroke="#93c5fd"/>
  <text x="660" y="523" text-anchor="middle" font-size="12" font-weight="600" fill="#1e40af">支付方式</text>
  <text x="660" y="541" text-anchor="middle" font-size="10" fill="#3b82f6">IPayment</text>

  <!-- ============ Footer ============ -->
  <text x="400" y="592" text-anchor="middle" font-size="11" fill="#64748b">运行时按优先级解析:  <tspan font-weight="600" fill="#92400e">业务自身实现</tspan>   →   <tspan font-weight="600" fill="#166534">业务挂载的能力</tspan>   →   <tspan font-weight="600" fill="#475569">默认实现</tspan></text>
</svg>
